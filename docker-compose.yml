services:
  db:
    image: postgres:15-alpine
    container_name: ocular-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ocular_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ocular_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: ocular-backend
    restart: always
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/ocular_db
      OLLAMA_URL: http://host.docker.internal:11434
      MLFLOW_TRACKING_URI: http://mlflow:5000
    ports:
      - "8000:8000"
    volumes:
      - backend_uploads:/app/static/uploads
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: ocular-frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.11.1
    container_name: ocular-mlflow
    restart: always
    ports:
      - "5000:5000"
    volumes:
      - mlflow_data:/mlflow
    command: mlflow server --host 0.0.0.0 --port 5000 --backend-store-uri sqlite:///mlflow/mlflow.db --default-artifact-root /mlflow/artifacts

volumes:
  postgres_data:
    driver: local
  backend_uploads:
    driver: local
  mlflow_data:
    driver: local

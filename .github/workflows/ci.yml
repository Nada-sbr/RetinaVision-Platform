name: Ocular AI CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install torch==2.2.1 torchvision==0.17.1 --index-url https://download.pytorch.org/whl/cpu
        pip install -r backend/requirements.txt
        pip install black ruff flake8

    - name: Run Black formatter check
      run: black --check backend/app ml_pipeline/

    - name: Run Ruff linter
      run: ruff check backend/app ml_pipeline/

    - name: Run Flake8 code standard checks
      run: flake8 backend/app ml_pipeline/ --config=.flake8

    - name: Run PyTest test suite
      run: |
        cd backend
        python -m pytest tests/ -v

  build-docker-images:
    needs: lint-and-test
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Create mock checkpoints for build validation
      run: |
        mkdir -p checkpoints
        echo "mock" > checkpoints/best_model.pth

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build Backend Docker Image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: backend/Dockerfile
        push: false
        tags: ocular-backend:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Build Frontend Docker Image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: frontend/Dockerfile
        push: false
        tags: ocular-frontend:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max
